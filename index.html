<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Atrapar Limones - Movilis Edition</title>
  <link rel="stylesheet" href="limones.css">
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body onload="iniciarJuego();">

  <div class="bg-blob"></div>

  <div class="main-wrapper">
    <header class="game-header">
      <div class="brand-section">
        <img src="LOGO FULL.png" alt="Logo Movilis" class="brand-logo">
      </div>
      <div class="title-section">
        <h1>Atrapar Limones</h1>
        <p class="motto">"Si del cielo te caen limones... aprende a hacer limonada"</p>
      </div>
    </header>

    <main class="game-container">
      <aside class="stats-panel">
        <div class="stat-card score-card">
          <span class="icon">⭐</span>
          <div class="stat-info">
            <small>PUNTOS</small>
            <span id="txtPuntaje">0</span>
          </div>
        </div>
        <div class="stat-card lives-card">
          <span class="icon">❤️</span>
          <div class="stat-info">
            <small>VIDAS</small>
            <span id="txtVidas">3</span>
          </div>
        </div>
        <div class="stat-card timer-card">
          <span class="icon">⏱️</span>
          <div class="stat-info">
            <small>TIEMPO</small>
            <span id="txtTiempo">30</span>
          </div>
        </div>
      </aside>

      <section class="canvas-area">
        <div class="canvas-border">
          <canvas id="areaJuego" width="600" height="400"></canvas>
          <div id="game-overlay">
            <p id="mensaje-flotante"></p>
          </div>
        </div>
      </section>

      <aside class="controls-panel">
        <div class="d-pad">
          <button class="btn-action btn-move" onclick="moverIzquierda();" aria-label="Izquierda">◀</button>
          <button class="btn-action btn-move" onclick="moverDerecha();" aria-label="Derecha">▶</button>
        </div>
        <button class="btn-action btn-reset" onclick="reiniciarJuego();">
          REINICIAR JUEGO
        </button>
        <p class="author-tag">By: <span>Alexandra Ramírez</span></p>
      </aside>
    </main>
  </div>
  <script src="utils.js"></script>
  <script src="limones.js"></script>
</body>
</html>
