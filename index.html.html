<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Atrapar Limones - Movilis Edition</title>
  <link rel="stylesheet" href="limones.css">
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap" rel="stylesheet">
</head>
<body onload="iniciarJuego();">

  <div class="glass-container">
    <header class="game-header">
      <img src="LOGO FULL.png" alt="Logo Movilis" class="brand-logo">
      <h1>Atrapar Limones</h1>
      <div class="motto">
        <p>"Si del cielo te caen limones... aprende a hacer limonada"</p>
      </div>
      <p class="author">By: <span>Alexandra Ramírez</span></p>
    </header>

    <main class="game-layout">
      <section class="canvas-wrapper">
        <canvas id="areaJuego" width="600" height="400"></canvas>
        <div id="game-overlay">
          <p id="mensaje-flotante"></p>
        </div>
      </section>

      <aside class="game-panel">
        <div class="stats-grid">
          <div class="stat-card score">
            <small>PUNTOS</small>
            <span id="txtPuntaje">0</span>
          </div>
          <div class="stat-card lives">
            <small>VIDAS</small>
            <span id="txtVidas">3</span>
          </div>
          <div class="stat-card timer">
            <small>TIEMPO</small>
            <span id="txtTiempo">30</span>
          </div>
        </div>

        <div class="controls-section">
          <div class="d-pad">
            <button class="btn-move" onclick="moverIzquierda();">◀</button>
            <button class="btn-move" onclick="moverDerecha();">▶</button>
          </div>
          <button class="btn-reset" onclick="reiniciarJuego();">REINICIAR</button>
        </div>
      </aside>
    </main>
  </div>

  <script src="utils.js"></script>
  <script src="limones.js"></script>
</body>
</html>
